<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo + Soat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 id="date"></h1>
    <h2 id="clock"></h2>

    <div class="todo">
        <h3>Todo List</h3>

        <div class="input-box">
            <input type="text" id="todoInput" placeholder="Type todo...">
            <button id="addBtn">Add</button>
        </div>

        <ul id="todoList"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
